# Example Nginx reverse-proxy config for CachePanel.
# Place this in /etc/nginx/sites-available/cachepanel and symlink into sites-enabled.
# Required for the terminal: WebSocket upgrade headers on /api/terminal/socket.

server {
    listen 80;
    server_name panel.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name panel.example.com;

    ssl_certificate     /etc/letsencrypt/live/panel.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/panel.example.com/privkey.pem;

    # Reasonable upload size for the file manager (matches the 200 MB API cap).
    client_max_body_size 200M;

    # Security headers — Next.js already sets a base set, these reinforce them.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        proxy_pass http://127.0.0.1:8992;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket upgrade for /api/terminal/socket
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Don't drop the terminal during a long idle session.
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
